<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Handshake Task Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Handshake project monitor</p>
          <h1>Task status dashboard</h1>
        </div>
        <div class="timestamp" id="generated-at"></div>
      </header>

      <section class="summary-grid" id="summary-grid" aria-label="Task summary"></section>

      <section class="workbench">
        <div class="toolbar" aria-label="Task filters">
          <label class="search-box">
            <span>Search</span>
            <input id="search-input" type="search" placeholder="Task ID, stage, or title" />
          </label>
          <label>
            <span>Stage</span>
            <select id="stage-filter"></select>
          </label>
          <label>
            <span>Build</span>
            <select id="build-filter"></select>
          </label>
        </div>

        <div class="table-meta">
          <strong id="result-count"></strong>
          <span id="active-filter-copy"></span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Task ID</th>
                <th>Stage</th>
                <th>Status</th>
                <th>Build</th>
                <th>Title</th>
              </tr>
            </thead>
            <tbody id="task-table"></tbody>
          </table>
        </div>
      </section>

      <section class="detail-grid">
        <article>
          <div class="panel-heading">
            <h2>Stage Breakdown</h2>
            <span id="stage-total"></span>
          </div>
          <div class="bars" id="stage-bars"></div>
        </article>

        <article>
          <div class="panel-heading">
            <h2>Needs Attention</h2>
            <span id="attention-count"></span>
          </div>
          <div class="attention-list" id="attention-list"></div>
        </article>
      </section>

      <section class="id-panels">
        <article>
          <div class="panel-heading">
            <h2>Extra IDs Found</h2>
            <span id="extra-count"></span>
          </div>
          <pre id="extra-ids"></pre>
        </article>
        <article>
          <div class="panel-heading">
            <h2>Submitted IDs Missing</h2>
            <span id="missing-count"></span>
          </div>
          <pre id="missing-ids"></pre>
        </article>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
